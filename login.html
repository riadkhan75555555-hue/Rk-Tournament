<style>

<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 grid-pattern pointer-events-none"></div>
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none" style="background: radial-gradient(circle at 50% 50%, #004c5e 0%, transparent 70%);">
</div>
<!-- Login Container -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-6">
<!-- Animated Corner Accents (Intentional Asymmetry) -->
<div class="absolute top-12 left-12 w-24 h-px bg-primary/30"></div>
<div class="absolute top-12 left-12 h-24 w-px bg-primary/30"></div>
<div class="absolute bottom-12 right-12 w-32 h-px bg-primary/20"></div>
<div class="absolute bottom-12 right-12 h-32 w-px bg-primary/20"></div>
<!-- The Admin HUD Card -->
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl font-black italic tracking-tighter text-white uppercase">
                    Esports <span class="text-primary">League</span>
</h1>
<p class="font-headline text-[10px] tracking-[0.3em] text-primary/60 mt-2 uppercase font-bold">
                    System Authentication Required
                </p>
</div>
<!-- Main Login Card -->
<div class="glass-panel border-l-4 border-primary neon-glow p-10 relative overflow-hidden">
<!-- Stat-Strip Style Accent -->
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="lock">lock</span>
</div>
<div class="space-y-8">
<div class="space-y-2">
<h2 class="font-headline text-xl font-bold uppercase tracking-wide">Admin Portal</h2>
<p class="text-on-surface-variant text-sm">Elite Tier Access Only. Enter authorization sequence.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-primary/80 font-semibold" for="password">
                                Security Protocol
                            </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/50 text-xl" data-icon="key">key</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-white pl-12 pr-4 py-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none rounded-none font-mono tracking-widest" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="kinetic-gradient w-full py-4 px-6 font-headline font-black uppercase tracking-widest text-on-primary-fixed hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group" type="submit">
<span>Initiate Login</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Card Footer Info -->
<div class="mt-10 flex justify-between items-center text-[10px] text-on-surface-variant uppercase tracking-widest font-bold border-t border-outline-variant/20 pt-6">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
<span>Server: Secure_Node_04</span>
</div>
<span>Tier 1 Access</span>
</div>
</div>
<!-- Secondary Links (Hidden Admin Utility) -->
<div class="mt-8 flex justify-between px-2">
<a class="text-on-surface-variant hover:text-primary transition-colors text-xs font-label uppercase tracking-widest" href="#">
                    Forgot Key?
                </a>
<a class="text-on-surface-variant hover:text-white transition-colors text-xs font-label uppercase tracking-widest flex items-center gap-1" href="/">
<span class="material-symbols-outlined text-sm" data-icon="home">home</span>
                    Return to League
                </a>
</div>
</div>
</main>
<!-- Visual Polish: Floating "HUD" elements -->
<div class="fixed top-1/4 -left-20 opacity-10 pointer-events-none rotate-90">
<span class="font-headline text-8xl font-black text-white/5 tracking-[0.2em] whitespace-nowrap">AUTHENTICATION</span>
</div>
<div class="fixed bottom-1/4 -right-20 opacity-10 pointer-events-none -rotate-90">
<span class="font-headline text-8xl font-black text-white/5 tracking-[0.2em] whitespace-nowrap">ACCESS_RESTRICTED</span>
</div>
<!-- Decorative Background Image (Subtle Texture) -->
<div class="fixed inset-0 -z-10 opacity-5 grayscale contrast-150">
<img class="w-full h-full object-cover" data-alt="abstract close-up of high-end gaming hardware with glowing neon blue led lights and dark metallic surfaces in a futuristic setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0IXNS70ntH0HmQfP5OnTtkxAumEP41gp2bdtQcCPtch6cTDIxPGs7b0EmuBy_XSW6j09kfsxIsVHkN_cxdMia3_bRZ13xmX1rLZwUFsig7zymWukENGfH5oHbu_wyKYyO1uxUg8Su5XcrsQVVtRtYRCbYCxcnxUryq-VK1fJ0vWIw0sxw-OnxuSRa6e7HiAL-QEmzUEEqvt9Rh0YD7kKU_AJlj4BfAXF1Fi7ws8_Y1v9UgWyCLa4kWgavJ3lCqgyuYqeTWsKVxa4c"/>
</div>
<script>
        // Logic Protocol (As requested: Script-level constant)
        const ADMIN_SEQUENCE = "ESPORTS_ELITE_2024";
        const loginForm = document.querySelector('form');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const value = passwordInput.value;
            
            // Artificial delay for "processing" feel
            const btn = loginForm.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> <span>VERIFYING...</span>';
            btn.disabled = true;

            setTimeout(() => {
                if (value === ADMIN_SEQUENCE) {
                    // Success: Redirect to Dashboard (Path predicted from Shared Components)
                    window.location.href = "/dashboard";
                } else {
                    // Failure: Redirect to Access Denied or show error
                    // For this UI, we'll simulate a failure state before redirect
                    btn.classList.remove('kinetic-gradient');
                    btn.classList.add('bg-error');
                    btn.innerHTML = '<span class="material-symbols-outlined" data-icon="error">error</span> <span>ACCESS DENIED</span>';
                    
                    setTimeout(() => {
                        window.location.href = "/access-denied";
                    }, 1000);
                }
            }, 1200);
        });
    </script>
